<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign up for UrbanNest - Start your property lookup journey.">
    <title>Sign Up | UrbanNest</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Navigation -->
    <header class="header">
        <div class="container flex justify-between items-center">
            <a href="index.html" class="nav-logo">
                <i class="fa-solid fa-city"></i> UrbanNest
            </a>

            <nav class="nav-links hidden md:flex" style="display: flex; gap: 2rem; align-items: center;">
                <a href="index.html">Home</a>
                <a href="listing.html">Buy</a>
                <a href="listing.html">Rent</a>
                <a href="listing.html">Commercial</a>
                <a href="#">New Projects</a>
                <a href="#">Agents</a>
            </nav>

            <div class="flex items-center gap-sm">
                <a href="login.html" class="btn btn-outline">Login</a>
                <a href="post-property.html" class="btn btn-primary">
                    Post Property <span class="badge badge-accent"
                        style="margin-left: 0.5rem; background: rgba(255,255,255,0.2); color: white;">FREE</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Signup Section -->
    <section class="auth-container">
        <div class="auth-card" style="max-width: 500px;">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p class="text-muted">Start your journey with UrbanNest</p>
            </div>

            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <div style="position: relative;">
                        <input type="text" id="name" class="form-input" placeholder="John Doe" required>
                        <i class="fa-solid fa-user"
                            style="position: absolute; right: 1rem; top: 1rem; color: var(--text-muted);"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div style="position: relative;">
                        <input type="email" id="email" class="form-input" placeholder="name@example.com" required>
                        <i class="fa-solid fa-envelope"
                            style="position: absolute; right: 1rem; top: 1rem; color: var(--text-muted);"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                        <i class="fa-solid fa-lock"
                            style="position: absolute; right: 1rem; top: 1rem; color: var(--text-muted);"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div style="position: relative;">
                        <input type="password" id="confirm-password" class="form-input" placeholder="••••••••" required>
                        <i class="fa-solid fa-lock"
                            style="position: absolute; right: 1rem; top: 1rem; color: var(--text-muted);"></i>
                    </div>
                </div>

                <div class="form-links">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" required> I agree to the <a href="#">Terms & Conditions</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
            </form>

            <div class="social-login">
                <button class="social-btn">
                    <i class="fa-brands fa-google text-primary"></i> Sign up with Google
                </button>
            </div>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
